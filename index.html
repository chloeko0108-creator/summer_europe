                    <span className="bg-[#E9D8A6] text-[#003049] text-[11px] font-bold px-2.5 py-1 rounded-full whitespace-nowrap">{festival.city}</span>
                </div>
                <div className="space-y-2 text-[13px] font-medium text-slate-700 mb-3">
                    <div className="flex items-start"><i className="far fa-calendar-alt text-[#7D1128] w-5 text-center mr-1.5 mt-0.5"></i> <span>{festival.dates}</span></div>
                    <div className="flex items-start"><i className="far fa-clock text-[#7D1128] w-5 text-center mr-1.5 mt-0.5"></i> <span>{festival.time}</span></div>
                    <div className="flex items-start"><i className="fas fa-map-marker-alt text-[#7D1128] w-5 text-center mr-1.5 mt-0.5"></i> <span>{festival.location}</span></div>
                    <div className="flex items-start"><i className="fas fa-subway text-[#7D1128] w-5 text-center mr-1.5 mt-0.5"></i> <span>{festival.station}</span></div>
                </div>
                <div className="bg-white/50 p-3 rounded-[12px] text-[13px] text-[#003049] mb-4 border border-white/30 font-medium leading-relaxed">
                    {festival.desc}
                </div>
                <a href={festival.link} target="_blank" className="block text-center bg-[#005F73] text-white text-[14px] font-bold py-2.5 rounded-[12px] hover:bg-[#0A9396] shadow-sm transition">
                    前往官網 <i className="fas fa-external-link-alt ml-1 opacity-80"></i>
                </a>
            </div>
        );

        const TripView = () => (
            <div className="p-4 pt-8 pb-32">
                <h1 className="text-2xl font-bold text-[#003049] mb-6 drop-shadow-sm">旅程與交通</h1>
                
                <h2 className="text-[17px] font-bold text-[#005F73] mb-3 flex items-center"><i className="fas fa-plane-departure mr-2"></i> 航班資訊</h2>
                <div className="bg-white/65 backdrop-blur-md rounded-[24px] border border-white/60 shadow-[0_8px_32px_rgba(120,194,196,0.15)] mb-5 p-4 relative">
                    <div className="absolute top-3 right-3 bg-[#0A9396] text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">去程 CX289</div>
                    <div className="flex justify-between items-center mt-5 mb-1">
                        <div className="text-center flex-1">
                            <div className="text-3xl font-bold text-[#003049]">23:55</div>
                            <div className="text-[10px] font-bold text-slate-500 mt-1">22 Jul 2026</div>
                            <div className="text-[14px] font-bold text-[#7D1128] mt-1">HKG</div>
                            <div className="text-[10px] text-slate-600">Terminal 1</div>
                        </div>
                        <div className="px-2 text-[#0A9396] opacity-60 text-lg"><i className="fas fa-plane"></i></div>
                        <div className="text-center flex-1">
                            <div className="text-3xl font-bold text-[#003049]">07:15</div>
                            <div className="text-[10px] font-bold text-slate-500 mt-1">23 Jul 2026</div>
                            <div className="text-[14px] font-bold text-[#7D1128] mt-1">FRA</div>
                            <div className="text-[10px] text-slate-600">Terminal 3</div>
                        </div>
                    </div>
                </div>
                <div className="bg-white/65 backdrop-blur-md rounded-[24px] border border-white/60 shadow-[0_8px_32px_rgba(120,194,196,0.15)] mb-8 p-4 relative">
                    <div className="absolute top-3 right-3 bg-[#005F73] text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm">回程 QR58, QR818</div>
                    <div className="flex justify-between items-center mt-5 mb-1">
                        <div className="text-center flex-1">
                            <div className="text-3xl font-bold text-[#003049]">16:50</div>
                            <div className="text-[10px] font-bold text-slate-500 mt-1">12 Aug 2026</div>
                            <div className="text-[14px] font-bold text-[#7D1128] mt-1">MUC</div>
                            <div className="text-[10px] text-slate-600">München</div>
                        </div>
                        <div className="px-2 text-[#005F73] flex flex-col items-center">
                            <i className="fas fa-plane opacity-60 text-lg"></i>
                            <span className="text-[9px] mt-1 font-bold whitespace-nowrap bg-white/50 px-1.5 rounded">1 stop · 16h 20m</span>
                        </div>
                        <div className="text-center flex-1">
                            <div className="text-3xl font-bold text-[#003049]">15:10</div>
                            <div className="text-[10px] font-bold text-slate-500 mt-1">13 Aug 2026</div>
                            <div className="text-[14px] font-bold text-[#7D1128] mt-1">HKG</div>
                            <div className="text-[10px] text-slate-600">Hong Kong</div>
                        </div>
                    </div>
                </div>

                <h2 className="text-[17px] font-bold text-[#005F73] mb-3 flex items-center"><i className="fas fa-train mr-2"></i> 城市轉換日程</h2>
                {TRANSFERS.map((tf, i) => <TransferCard key={i} transfer={tf} />)}
            </div>
        );

        const StaysView = () => (
            <div className="p-4 pt-8 pb-32">
                <h1 className="text-2xl font-bold text-[#003049] mb-6 drop-shadow-sm">住宿總覽</h1>
                {STAYS.map((stay, i) => <StayCard key={i} stay={stay} />)}
            </div>
        );

        const DaySelector = ({ days, activeIndex, setActiveIndex }) => {
            const scrollRef = useRef(null);
            useEffect(() => {
                if (scrollRef.current) {
                    const selected = scrollRef.current.children[activeIndex];
                    if (selected) {
                        selected.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }
            }, [activeIndex]);

            return (
                <div className="flex overflow-x-auto px-4 py-3 space-x-3 no-scrollbar" ref={scrollRef}>
                    {days.map((day, idx) => (
                        <div key={idx} onClick={() => setActiveIndex(idx)} 
                            className={`flex-shrink-0 flex flex-col items-center justify-center w-[72px] h-[72px] rounded-[18px] cursor-pointer transition-all duration-300
                            ${activeIndex === idx ? 'bg-[#003049] text-white shadow-[0_4px_12px_rgba(0,48,73,0.4)] scale-105 border border-transparent' : 'bg-white/60 backdrop-blur-md border border-white/60 text-[#003049] shadow-sm'}`}>
                            <span className="text-[11px] font-bold mb-1 opacity-90">{day.city}</span>
                            <span className="text-[15px] font-bold">{day.date.split(' ')[0]}</span>
                        </div>
                    ))}
                </div>
            )
        };

        const ItineraryView = () => {
            const [activeDay, setActiveDay] = useState(0);
            const currentDay = ITINERARY[activeDay];

            return (
                <div className="flex flex-col h-full relative">
                    <div className="pt-2 sticky top-0 z-20 bg-white/40 backdrop-blur-[24px] backdrop-saturate-150 border-b border-white/30 shadow-sm">
                        <DaySelector days={ITINERARY} activeIndex={activeDay} setActiveIndex={setActiveDay} />
                    </div>
                    <div className="p-4 overflow-y-auto pb-32">
                        <div className="flex items-center mb-5">
                            <div className="w-1.5 h-6 bg-[#C1121F] rounded-full mr-3"></div>
                            <h2 className="text-[20px] font-bold text-[#003049]">
                                {currentDay.date} · {currentDay.city}行程
                            </h2>
                        </div>
                        {currentDay.events.map((event, idx) => (
                            <EventCard key={idx} event={event} city={currentDay.city} />
                        ))}
                    </div>
                </div>
            )
        };

        const FestivalsView = () => (
            <div className="p-4 pt-8 pb-32">
                <h1 className="text-2xl font-bold text-[#003049] mb-6 drop-shadow-sm">歐洲夏日節慶</h1>
                {FESTIVALS.map((fest, i) => <FestivalCard key={i} festival={fest} />)}
            </div>
        );

        const SavedView = () => (
            <div className="p-4 pt-8 pb-32">
                <h1 className="text-2xl font-bold text-[#003049] mb-6 drop-shadow-sm">口袋名單</h1>
                <div className="bg-white/50 backdrop-blur-md rounded-[24px] border border-white/60 p-8 text-center glass-card">
                    <i className="fas fa-bookmark text-4xl text-[#0A9396] mb-4 opacity-80"></i>
                    <h3 className="text-[16px] font-bold text-[#003049] mb-2">尚無收藏的景點或餐廳</h3>
                    <p className="text-[13px] text-slate-600 font-medium">您可以在瀏覽地圖或資訊時，將喜歡的地點加入口袋名單。</p>
                </div>
            </div>
        );

        const InfoView = () => (
            <div className="p-4 pt-8 pb-32 flex flex-col items-center justify-center h-[80vh] text-center">
                <div className="bg-white/60 backdrop-blur-md rounded-[32px] border border-white/60 p-10 glass-card max-w-sm w-full">
                    <i className="fas fa-passport text-5xl text-[#005F73] mb-5"></i>
                    <h1 className="text-xl font-bold text-[#003049] mb-3">旅遊實用資訊</h1>
                    <p className="text-[14px] font-medium text-slate-600 leading-relaxed">
                        簽證規定、緊急聯絡方式、匯率換算與退稅指南，將於出發前一個月完整更新。
                    </p>
                </div>
            </div>
        );

        const BottomNav = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'trip', icon: 'plane', label: '旅程' },
                { id: 'stays', icon: 'bed', label: '住宿' },
                { id: 'itinerary', icon: 'map-signs', label: '行程' },
                { id: 'festivals', icon: 'ticket-alt', label: '節慶' },
                { id: 'saved', icon: 'heart', label: '收藏' },
                { id: 'info', icon: 'info-circle', label: '資訊' }
            ];

            return (
                <div className="fixed bottom-0 w-full px-2 pb-5 pt-3 bg-white/45 backdrop-blur-[24px] backdrop-saturate-200 border-t border-white/60 z-50 shadow-[0_-4px_24px_rgba(0,0,0,0.05)]">
                    <div className="flex justify-around items-center max-w-md mx-auto">
                        {tabs.map(tab => {
                            const isActive = activeTab === tab.id;
                            return (
                                <div key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                    className={`flex flex-col items-center justify-center w-[16%] py-1 transition-all duration-300 cursor-pointer ${isActive ? 'scale-110' : 'opacity-60 hover:opacity-100'}`}>
                                    <i className={`fas fa-${tab.icon} text-[20px] mb-1 transition-colors ${isActive ? 'text-[#C1121F] drop-shadow-sm' : 'text-[#003049]'}`}></i>
                                    <span className={`text-[10px] font-bold transition-colors ${isActive ? 'text-[#C1121F]' : 'text-[#003049]'}`}>{tab.label}</span>
                                </div>
                            )
                        })}
                    </div>
                </div>
            )
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('itinerary');

            return (
                <div className="relative min-h-screen text-[#003049] font-sans selection:bg-[#94D2BD] selection:text-[#003049]" 
                     style={{
                        backgroundImage: `url('https://media.cntraveller.com/photos/64f989cf7ab98683c3e3b687/1:1/w_3968,h_3968,c_limit/Nice-GettyImages-686516363.jpeg')`,
                        backgroundSize: 'cover', backgroundPosition: 'center', backgroundAttachment: 'fixed'
                     }}>
                    
                    {/* 毛玻璃遮罩，調整透明度讓南法海灘更明亮 */}
                    <div className="absolute inset-0 bg-white/35 backdrop-blur-[16px] backdrop-saturate-150 z-0"></div>
                    
                    <div className="relative z-10 h-screen overflow-hidden flex flex-col max-w-md mx-auto bg-white/10 shadow-2xl border-x border-white/20">
                        <div className="flex-1 overflow-y-auto no-scrollbar relative">
                            {activeTab === 'trip' && <TripView />}
                            {activeTab === 'stays' && <StaysView />}
                            {activeTab === 'itinerary' && <ItineraryView />}
                            {activeTab === 'festivals' && <FestivalsView />}
                            {activeTab === 'saved' && <SavedView />}
                            {activeTab === 'info' && <InfoView />}
                        </div>
                        <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                    </div>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
