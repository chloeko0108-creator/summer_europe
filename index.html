                return '17 Rue de Molsheim, 67000 Strasbourg, 法國';

            // 盧森堡 Airbnb (7月28 - 7月30)
            if (n.includes('盧森堡 airbnb') || (n.includes('airbnb') && city === '盧森堡')) {
                return '35 Rue Michel Rodange, 2430 Luxembourg, 盧森堡';
            }
            
            // 飯店精確對應
            if (n.includes('adagio') || n.includes('阿達吉奧') || n.includes('弗萊堡飯店') || (n.includes('飯店') && city === '弗萊堡')) {
                return 'Eugen-Martin-Straße 1, 79106 Freiburg im Breisgau, 德國';
            }
            if (n.includes('9hotel') || n.includes('布魯塞爾飯店') || (n.includes('飯店') && city === '布魯塞爾')) {
                return 'Rue De La Paille 2-8, Brussels, 1000 比利時';
            }
            if (n.includes('holiday inn') || n.includes('阿姆斯特丹飯店') || (n.includes('飯店') && city === '阿姆斯特丹')) {
                return 'Cruquiusweg 61, Amsterdam, 1019AT 荷蘭';

            if (n.includes('romy') || n.includes('柏林飯店') || (n.includes('飯店') && (city === '柏林' || city === '波茲坦'))) {
                return 'Invalidenstraße 53, Berlin, 10557 德國';

                        <div class="flex flex-col gap-3 mt-3">
                            <div class="flex items-center gap-2 text-[13px] text-slate-700 bg-white/60 p-2.5 rounded-[12px] border border-white/60 shadow-sm">
                                <i data-lucide="clock" class="w-4 h-4 text-[#7D1128] shrink-0"></i>
                                <span class="font-bold">${place.hours}</span>
                            </div>
                            
                            <div class="flex items-center gap-2 mt-1">
                                <a href="${mapUrl}" target="_blank" class="flex-1 bg-white hover:bg-slate-50 text-[#005F73] border border-[#005F73]/20 shadow-sm py-2 px-3 rounded-xl flex items-center justify-center gap-1.5 transition-all font-bold text-xs">
                                    <i data-lucide="navigation" class="w-3.5 h-3.5"></i>
                                    定位導航
                                </a>
                                <a href="${place.url}" target="_blank" class="flex-1 bg-[#003049] hover:bg-[#005F73] text-white shadow-sm py-2 px-3 rounded-xl flex items-center justify-center gap-1.5 transition-all font-bold text-xs">
                                    <i data-lucide="globe" class="w-3.5 h-3.5"></i>
                                    官方網站
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                html += createGlassCard(content, 'relative overflow-hidden group', true);
            });
            
            html += `</div></div>`;
            return html;
        }

        // 更新底部導覽列 UI
        function updateBottomNav() {
            const navContainer = document.getElementById('bottom-nav');
            let html = '';
            TABS.forEach(tab => {
                const isActive = state.activeTab === tab.id;
                html += `
                    <button onclick="setTab('${tab.id}')" class="relative flex flex-col items-center justify-center w-16 h-12 rounded-full transition-all duration-300 ${isActive ? 'bg-white/90 shadow-sm scale-105' : 'hover:bg-white/50'}">
                        <i data-lucide="${tab.icon}" class="${isActive ? 'w-[22px] h-[22px] text-[#003049]' : 'w-5 h-5 text-slate-600'}" style="stroke-width: ${isActive ? '2.5' : '2'};"></i>
                        <span class="text-[10px] mt-1 font-bold ${isActive ? 'text-[#003049]' : 'text-slate-600'}">${tab.label}</span>
                        ${isActive ? `<div class="absolute -bottom-1 w-1.5 h-1.5 bg-[#C1121F] rounded-full shadow-[0_0_8px_#C1121F]"></div>` : ''}
                    </button>
                `;
            });
            navContainer.innerHTML = html;
        }

        // 主渲染函數
        function renderApp() {
            const contentContainer = document.getElementById('app-content');
            
            switch(state.activeTab) {
                case 'trip': contentContainer.innerHTML = renderTripView(); break;
                case 'itinerary': contentContainer.innerHTML = renderItineraryView(); break;
                case 'festival': contentContainer.innerHTML = renderFestivalView(); break;
                case 'stay': contentContainer.innerHTML = renderStayView(); break;
                case 'saved': contentContainer.innerHTML = renderSavedView(); break;
            }
            
            updateBottomNav();
            
            // 重新初始化 Lucide Icons
            lucide.createIcons();

            // 如果是行程視圖，處理水平滾動置中
            if (state.activeTab === 'itinerary') {
                const activeBtn = document.getElementById(`day-btn-${state.activeDayIdx}`);
                const container = document.getElementById('day-nav-container');
                if (activeBtn && container) {
                    // 簡單的 JS 模擬 scrollIntoView({ inline: 'center' }) 行為，確保相容性
                    const scrollLeft = activeBtn.offsetLeft - (container.clientWidth / 2) + (activeBtn.clientWidth / 2);
                    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }
        }

        // 全域互動函數
        window.setTab = function(tabId) {
            if (state.activeTab !== tabId) {
                state.activeTab = tabId;
                renderApp();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.setDay = function(dayIdx) {
            if (state.activeDayIdx !== dayIdx) {
                state.activeDayIdx = dayIdx;
                renderApp();
            }
        };

        window.toggleElement = function(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            if (content && chevron) {
                content.classList.toggle('expanded');
                chevron.classList.toggle('rotate-180');
            }
        };

        // 初始載入
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
