            const n = name.toLowerCase();
            if (n.includes('strasbourg-ville') || n.includes('strasbourg ville')) return 'Strasbourg Ville train station';
            if (n.includes('adagio') || n.includes('阿達吉奧') || (n.includes('飯店') && city === '弗萊堡')) return 'Eugen-Martin-Straße 1, 79106 Freiburg im Breisgau, 德國';
            if ((n.includes('airbnb') || n.includes('民宿') || n.includes('住處')) && (city === '斯特拉斯堡' || city === '科爾馬')) return '17 Rue de Molsheim, 67000 Strasbourg, 法國';
            if ((n.includes('airbnb') || n.includes('民宿') || n.includes('住處')) && city === '盧森堡') return '35 Rue Michel Rodange, 2430 Luxembourg, 盧森堡';
            return name;
        }

        }

                    ? 'bg-[#003049] text-white shadow-md transform scale-105' 
                    : 'bg-white/60 text-[#003049] hover:bg-white/80 font-medium';
                html += `
                    <button onclick="setDay(${idx})" id="day-btn-${idx}" class="flex-shrink-0 snap-center rounded-[16px] px-4 py-2 transition-all border border-white/40 ${btnClass}">

            `;

                    const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(mapOrigin)}&destination=${encodeURIComponent(mapDest)}&travelmode=transit`;
                    
                    const isWalk = (event.transportDetails?.line || '').includes('步行');
                    const isBus = (event.transportDetails?.line || '').match(/公車|巴士|渡輪|接駁/);
                    const TransportModeIcon = isWalk ? 'footprints' : (isBus ? 'bus' : 'train');

                                            <span class="text-[14px] font-bold text-[#C1121F] leading-tight">${event.title}</span>

                                                </a>
                                            ` : ''}
                                            <div class="text-slate-400 bg-white/60 rounded-full p-0.5 shadow-sm">
                                                <i data-lucide="chevron-down" id="event-chevron-${idSuffix}" class="w-3.5 h-3.5 transition-transform duration-200"></i>
                                            </div>
                                        </div>
                                    </div>
                                    ${event.transportDetails ? `
                                        <div class="bg-white/80 rounded-lg p-2 border border-white shadow-sm flex flex-col gap-1">
                                            <div class="flex items-center gap-1 text-[12px] font-bold text-[#003049]">
                                                <span class="truncate">${event.transportDetails.boarding}</span>

                                                <i data-lucide="arrow-right" class="w-2 h-2 text-[#0A9396] mx-0.5 shrink-0"></i>
                                                <span class="truncate">往 ${event.transportDetails.direction}</span>
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                                <div id="event-dt-${idSuffix}" class="collapse-content px-2.5 pb-2.5 pt-0 slide-in">
                                    <div class="text-[13px] font-medium text-slate-800 leading-relaxed p-2 bg-white/50 rounded-lg border border-white/50 shadow-inner">
                                        <span class="text-[#C1121F] font-bold mr-1">活動：</span>${event.desc}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // 一般地點卡片
                    html += `
                        <div class="relative group">
                            <div class="absolute -left-[39px] w-7 h-7 rounded-full border-[2.5px] border-white bg-[#005F73] text-white flex items-center justify-center shadow-sm z-10 top-2.5">
                                <i data-lucide="${event.icon}" class="w-3 h-3"></i>

                            <div class="bg-white/80 backdrop-blur-[20px] border border-white/60 shadow-sm rounded-[24px] mt-1 hover:bg-white/90 transition-all p-0 relative overflow-hidden">
                                <div class="p-2.5 cursor-pointer" onclick="toggleElement('event-dt-${idSuffix}', 'event-chevron-${idSuffix}')">

                                                </a>

                                            <div class="text-slate-400 bg-white/50 rounded-full p-0.5 shadow-sm">
                                                <i data-lucide="chevron-down" id="event-chevron-${idSuffix}" class="w-3.5 h-3.5 transition-transform duration-200"></i>
                                            </div>
                                        </div>

                                    ${event.locationDetails?.address ? `
                                        <div class="flex items-start gap-1 mt-1 px-1">
                                            <i data-lucide="map-pin" class="w-[11px] h-[11px] text-[#0A9396] mt-[3px] flex-shrink-0"></i>
                                            <span class="text-[11px] font-bold text-[#003049] leading-tight opacity-75 truncate">${event.locationDetails.address}</span>

                                <div id="event-dt-${idSuffix}" class="collapse-content px-2.5 pb-2.5 pt-0 slide-in">
                                    <div class="text-[13px] font-medium text-slate-700 leading-relaxed p-2 bg-white/50 rounded-lg border border-white/50 shadow-inner">
                                        <span class="text-[#005F73] font-bold mr-1">活動：</span>${event.desc}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            html += `</div></div></div>`;
            return html;

                <div class="flex flex-col items-center justify-center h-[70vh] px-6 text-center space-y-4 fade-in">
                    <div class="w-20 h-20 bg-white/40 rounded-full flex items-center justify-center backdrop-blur-md border border-white/60 shadow-lg">
                        <i data-lucide="heart" class="w-10 h-10 text-[#0A9396]"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">口袋名單</h2>
                    <p class="text-slate-600 font-medium leading-relaxed">顯示已收藏的景點、餐廳與店鋪。包含標籤與筆記說明。</p>
                    <div class="px-4 py-2 bg-white/60 rounded-full text-sm font-bold text-[#003049] border border-white/60 shadow-sm">
                        開發中模組
                    </div>
                </div>
            `;
        }

        // 更新底部導覽列 UI
        function updateBottomNav() {
            const navContainer = document.getElementById('bottom-nav');
            let html = '';
            TABS.forEach(tab => {
                const isActive = state.activeTab === tab.id;
                html += `
                    <button onclick="setTab('${tab.id}')" class="relative flex flex-col items-center justify-center w-16 h-12 rounded-full transition-all duration-300 ${isActive ? 'bg-white/90 shadow-sm scale-105' : 'hover:bg-white/50'}">
                        <i data-lucide="${tab.icon}" class="${isActive ? 'w-[22px] h-[22px] text-[#003049]' : 'w-5 h-5 text-slate-600'}" style="stroke-width: ${isActive ? '2.5' : '2'};"></i>
                        <span class="text-[10px] mt-1 font-bold ${isActive ? 'text-[#003049]' : 'text-slate-600'}">${tab.label}</span>
                        ${isActive ? `<div class="absolute -bottom-1 w-1.5 h-1.5 bg-[#C1121F] rounded-full shadow-[0_0_8px_#C1121F]"></div>` : ''}
                    </button>
                `;
            });
            navContainer.innerHTML = html;
        }

        // 主渲染函數
        function renderApp() {
            const contentContainer = document.getElementById('app-content');
            
            switch(state.activeTab) {
                case 'trip': contentContainer.innerHTML = renderTripView(); break;
                case 'itinerary': contentContainer.innerHTML = renderItineraryView(); break;
                case 'festival': contentContainer.innerHTML = renderFestivalView(); break;
                case 'stay': contentContainer.innerHTML = renderStayView(); break;
                case 'saved': contentContainer.innerHTML = renderPlaceholderView(); break;
            }
            
            updateBottomNav();
            
            // 重新初始化 Lucide Icons
            lucide.createIcons();

            // 如果是行程視圖，處理水平滾動置中
            if (state.activeTab === 'itinerary') {
                const activeBtn = document.getElementById(`day-btn-${state.activeDayIdx}`);
                const container = document.getElementById('day-nav-container');
                if (activeBtn && container) {
                    // 簡單的 JS 模擬 scrollIntoView({ inline: 'center' }) 行為，確保相容性
                    const scrollLeft = activeBtn.offsetLeft - (container.clientWidth / 2) + (activeBtn.clientWidth / 2);
                    container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }
        }

        // 全域互動函數
        window.setTab = function(tabId) {
            if (state.activeTab !== tabId) {
                state.activeTab = tabId;
                renderApp();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.setDay = function(dayIdx) {
            if (state.activeDayIdx !== dayIdx) {
                state.activeDayIdx = dayIdx;
                renderApp();
            }
        };

        window.toggleElement = function(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            if (content && chevron) {
                content.classList.toggle('expanded');
                chevron.classList.toggle('rotate-180');
            }
        };

        // 初始載入
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
